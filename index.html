<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream);
    color: var(--fg-default);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: rgba(255,107,71,0.22); color: var(--navy); }

  /* dawn wash — fixed radial gradient */
  .ci-dawn {
    position: fixed; inset: -10%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(70% 50% at 85% 10%, rgba(255,107,71,0.12), transparent 60%),
      radial-gradient(60% 50% at 10% 95%, rgba(110,150,128,0.12), transparent 60%),
      radial-gradient(50% 40% at 50% 50%, rgba(201,169,97,0.06), transparent 70%);
    animation: ci-dawn-drift 24s ease-in-out infinite alternate;
  }
  /* paper grain — fixed */
  .ci-grain {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image: url('assets/paper-grain.svg');
    background-size: 180px 180px;
    opacity: 0.34; mix-blend-mode: multiply;
  }
  @keyframes ci-dawn-drift {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(-2%, 2%); }
  }
  @keyframes ci-ping {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(2.4); opacity: 0;   }
  }
  @keyframes ci-seal-spin { to { transform: rotate(360deg); } }
  @keyframes ci-fadeup {
    0% { opacity: 0; transform: translateY(18px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .ci-stagger > * { animation: ci-fadeup 0.8s var(--ease-out) both; }
  .ci-stagger > *:nth-child(1) { animation-delay: 0ms; }
  .ci-stagger > *:nth-child(2) { animation-delay: 130ms; }
  .ci-stagger > *:nth-child(3) { animation-delay: 260ms; }
  .ci-stagger > *:nth-child(4) { animation-delay: 390ms; }
  .ci-stagger > *:nth-child(5) { animation-delay: 520ms; }
  .ci-stagger > *:nth-child(6) { animation-delay: 650ms; }

  /* reduce-motion toggle — applied via data attribute */
  [data-intensity="0"] *,
  [data-intensity="0"] *::before,
  [data-intensity="0"] *::after {
    animation: none !important;
    transition: none !important;
  }

  /* Tweaks panel */

    position: fixed; right: 24px; bottom: 24px; z-index: 9999;
    background: var(--bg-raised);

    <article style="max-width:760px;margin:60px auto;padding:0 24px;font-family:'Dosis',system-ui,sans-serif;color:#0B1B2B;line-height:1.55">
      <h1 style="font-size:42px;line-height:1.05;margin:0 0 16px">ik ben ok — een check-in app voor alleenwonende ouderen en mantelzorgers</h1>
      <p style="font-size:18px;color:rgba(11,27,43,0.78);margin:0 0 24px"><strong>Een alarm dat afgaat als er níet gereageerd wordt.</strong> Geen paniekknop, geen halsketting om te vergeten — alleen een bevestiging dat alles goed is.</p>
      <h2 style="font-size:24px;margin:32px 0 12px">Zo werkt het</h2>
      <ol>
        <li><strong>Op vaste tijden</strong> — een check-in wanneer je wilt; één tik bevestigt dat alles oké is.</li>
        <li><strong>Bij stilte</strong> — reageer je niet binnen 10 minuten, dan ontvangt de mantelzorger een bericht met locatie en contactopties.</li>
        <li><strong>Voor de mantelzorger</strong> — altijd verbonden, nooit opdringerig.</li>
      </ol>
      <h2 style="font-size:24px;margin:32px 0 12px">Prijs</h2>
      <p>Eén abonnement: <strong>€2,75 per maand</strong>. Onbeperkte check-ins, tot 5 contactpersonen koppelen, opzegbaar per maand, 14 dagen gratis proberen.</p>

      <h2 style="font-size:24px;margin:32px 0 12px">Veelgestelde vragen</h2>
      <h3 style="font-size:18px;margin:20px 0 6px">Voor wie is ik ben ok bedoeld?</h3>
      <p>Voor alleenwonende ouderen die zelfstandig willen blijven wonen, en voor hun mantelzorgers die gerustheid willen zonder opdringerig te zijn. Ook geschikt voor mensen met een chronische aandoening of risico op vallen.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Is dit een alternatief voor personenalarmering?</h3>
      <p>Ja. Een traditionele paniekknop werkt niet als de drager bewusteloos is, in de war is, of de knop niet kan bereiken na een val. ik ben ok werkt omgekeerd: het uitblijven van een reactie is het signaal.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Werkt het ook bij dementie?</h3>
      <p>De check-in is een korte tap. Voor mensen in een vroeg stadium van dementie kan dat werken; in latere stadia is mantelzorger-supervisie nodig. We adviseren proefperiode van 14 dagen om te kijken of het past.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Wat gebeurt er met mijn gegevens?</h3>
      <p>We verwerken alleen wat nodig is voor de check-in en de notificaties naar mantelzorgers. Locatie wordt alleen gedeeld bij een gemiste check-in, niet doorlopend. Privacy-overzicht volgt op een aparte pagina.</p>

      <p>Beschikbaar voor iOS en Android. Vragen? <a href="mailto:hallo@ikbenok.nl">hallo@ikbenok.nl</a> · <a href="enquete/">Vul de enquête in</a> · <a href="sv/">Svenska</a></p>
    </article>
  </noscript>

<!-- Tweaks panel (hidden by default — toggled by host) -->
<div class="tweaks-panel" id="tweaks">
  <h4>Tweaks</h4>
  <p class="tweaks-sub">Pas de rust van de pagina aan.</p>
  <label>Animatie</label>
  <input type="range" id="tw-intensity" min="0" max="1" step="0.1" />
  <div class="tweaks-scale">
    <span>stil</span>
    <span>rustig</span>
    <span>levendig</span>
  </div>
</div>

<!-- Persisted tweak defaults -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "intensity": 1
  }/*EDITMODE-END*/;

  // ─── Tweaks protocol ──────────────────────────────────
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      document.getElementById('tweaks').setAttribute('data-visible', 'true');
    } else if (d.type === '__deactivate_edit_mode') {
      document.getElementById('tweaks').setAttribute('data-visible', 'false');
    }
  });
  window.parent.postMessage({type: '__edit_mode_available'}, '*');

  // apply + wire tweaks input
  function applyIntensity(v) {
    document.body.setAttribute('data-intensity', v);
    window.__intensity = parseFloat(v);
    // re-render React tree with new intensity
    if (window.__rerender) window.__rerender();
  }
  window.addEventListener('DOMContentLoaded', () => {
    const inp = document.getElementById('tw-intensity');
    inp.value = TWEAK_DEFAULTS.intensity;
    applyIntensity(TWEAK_DEFAULTS.intensity);
    inp.addEventListener('input', () => {
      applyIntensity(inp.value);
      window.parent.postMessage({
        type: '__edit_mode_set_keys',
        edits: { intensity: parseFloat(inp.value) }
      }, '*');
    });
  });
</script>

<script type="text/babel">

const App = () => {
  const [intensity, setIntensity] = React.useState(
    typeof window.__intensity === 'number' ? window.__intensity : 1
  );
  React.useEffect(() => {
    window.__rerender = () => setIntensity(window.__intensity);
    return () => {window.__rerender = null;};
  }, []);

  return (
    <div className="ci ci-stagger" style={{ margin: "0px" }}>
        <Nav />
        <Hero intensity={intensity} />
        <HowItWorks intensity={intensity} />
        <QuoteBlock />
        <Pricing />
        <Footer intensity={intensity} />
      </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

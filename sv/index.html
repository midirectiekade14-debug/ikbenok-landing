    <article style="max-width:760px;margin:60px auto;padding:0 24px;font-family:'Dosis',system-ui,sans-serif;color:#0B1B2B;line-height:1.55">
      <h1 style="font-size:42px;line-height:1.05;margin:0 0 16px">jag är ok — en incheckningsapp för ensamboende äldre och anhöriga</h1>
      <p style="font-size:18px;color:rgba(11,27,43,0.78);margin:0 0 24px"><strong>Ett larm som går när någon inte svarar.</strong> Ingen panikknapp, inget halsband att glömma — bara en bekräftelse på att allt är bra.</p>
      <h2 style="font-size:24px;margin:32px 0 12px">Så fungerar det</h2>
      <ol>
        <li><strong>Vid fasta tider</strong> — en incheckning när du vill; ett tryck bekräftar att allt är okej.</li>
        <li><strong>Vid tystnad</strong> — om du inte svarar inom 30 minuter får anhöriga ett meddelande med plats och kontaktalternativ.</li>
        <li><strong>För anhöriga</strong> — alltid uppkopplad, aldrig påträngande.</li>
      </ol>
      <h2 style="font-size:24px;margin:32px 0 12px">Pris</h2>
      <p>Ett abonnemang: <strong>29 kr/månad</strong>. Obegränsade incheckningar, upp till 5 kontaktpersoner, månadsvis uppsägning, 14 dagar gratis.</p>

      <h2 style="font-size:24px;margin:32px 0 12px">Vanliga frågor</h2>
      <h3 style="font-size:18px;margin:20px 0 6px">Vem är jag är ok till för?</h3>
      <p>För ensamboende äldre som vill bo kvar hemma, och för deras anhöriga som vill ha trygghet utan att vara påträngande. Också lämpligt för personer med kronisk sjukdom eller fallrisk.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Är detta ett alternativ till trygghetslarm?</h3>
      <p>Ja. Ett traditionellt trygghetslarm fungerar inte om bäraren är medvetslös, förvirrad eller inte når knappen efter ett fall. jag är ok fungerar tvärtom: det är frånvaron av reaktion som är signalen.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Fungerar det vid demens?</h3>
      <p>Incheckningen är ett kort tryck. För personer i tidig demensfas kan det fungera; i senare faser krävs anhörig-tillsyn. Vi rekommenderar 14 dagars gratis prov för att se om det passar.</p>
      <h3 style="font-size:18px;margin:20px 0 6px">Vad händer med mina uppgifter?</h3>
      <p>Vi behandlar bara det som behövs för incheckningen och meddelanden till anhöriga. Plats delas endast vid en missad incheckning, inte löpande. Mer detaljer kommer på en separat integritetssida.</p>

      <p>Tillgänglig för iOS och Android. Frågor? <a href="mailto:hallo@ikbenok.nl">hallo@ikbenok.nl</a> · <a href="../">Nederlands</a></p>
    </article>

<!-- Tweaks panel (hidden by default — toggled by host) -->
<div class="tweaks-panel" id="tweaks">
  <h4>Inställningar</h4>
  <p class="tweaks-sub">Justera sidans lugn.</p>
  <label>Animation</label>
  <input type="range" id="tw-intensity" min="0" max="1" step="0.1" />
  <div class="tweaks-scale">
    <span>tyst</span>
    <span>lugn</span>
    <span>livlig</span>
  </div>
</div>

<!-- Persisted tweak defaults -->
<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "intensity": 1
  }/*EDITMODE-END*/;

  // ─── Tweaks protocol ──────────────────────────────────
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') {
      document.getElementById('tweaks').setAttribute('data-visible', 'true');
    } else if (d.type === '__deactivate_edit_mode') {
      document.getElementById('tweaks').setAttribute('data-visible', 'false');
    }
  });
  window.parent.postMessage({type: '__edit_mode_available'}, '*');

  // apply + wire tweaks input
  function applyIntensity(v) {
    document.body.setAttribute('data-intensity', v);
    window.__intensity = parseFloat(v);
    // re-render React tree with new intensity
    if (window.__rerender) window.__rerender();
  }
  window.addEventListener('DOMContentLoaded', () => {
    const inp = document.getElementById('tw-intensity');
    inp.value = TWEAK_DEFAULTS.intensity;
    applyIntensity(TWEAK_DEFAULTS.intensity);
    inp.addEventListener('input', () => {
      applyIntensity(inp.value);
      window.parent.postMessage({
        type: '__edit_mode_set_keys',
        edits: { intensity: parseFloat(inp.value) }
      }, '*');
    });
  });
</script>

<script type="text/babel">

const App = () => {
  const [intensity, setIntensity] = React.useState(
    typeof window.__intensity === 'number' ? window.__intensity : 1
  );
  React.useEffect(() => {
    window.__rerender = () => setIntensity(window.__intensity);
    return () => {window.__rerender = null;};
  }, []);

  return (
    <div className="ci ci-stagger" style={{ margin: "0px" }}>
        <Nav />
        <Hero intensity={intensity} />
        <HowItWorks intensity={intensity} />
        <QuoteBlock />
        <Pricing />
        <Footer intensity={intensity} />
      </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
